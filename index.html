<!DOCTYPE html>
<html>
<head>
    <title>Danu & Sadali Wedding</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffdde1, #ee9ca7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 420px;
            width: 90%;
        }

        h1 {
            color: #e91e63;
            margin-bottom: 10px;
        }

        h2 {
            color: #555;
            margin-bottom: 20px;
        }

        p {
            color: #333;
            line-height: 1.6;
        }

        .date, .venue {
            margin-top: 10px;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #c2185b;
        }
    </style>

</head>

<body>
    <audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

    <div class="card">
        <h1>💍 Danu & Sadali 💍</h1>
        <h2>Wedding Invitation</h2>

        <p>ඔබට ආදරයෙන් ආරාධනා කරනවා අපේ විවාහ උත්සවයට ❤️</p>

        <div class="date">📅 2026 November 28</div>
        <div class="venue">📍 Colombo</div>

        <button class="btn">Join With Us 💖</button>
    </div>

</body>
</html>
